<!DOCTYPE html>
<html>
	<head>
		{% block head %}
			<meta charset="UTF-8" />
			<meta name="viewport" content="width=device-width, initial-scale=1.0" />
			<meta name="author" content="{{ settings.AUTHOR }}">

			<title>{{ settings.TITLE }}{% block title %}{% endblock %}</title>

			<link type="text/css" rel="stylesheet" href="/theme/katex/katex.min.css" />
			<link type="text/css" rel="stylesheet" href="/theme/fonts/Computer_Modern/Computer_Modern.css" />
			<link type="text/css" rel="stylesheet" href="/theme/css/pygment.light.css" media="(prefers-color-scheme: light), (prefers-color-scheme: no-preference)"/>
			<link type="text/css" rel="stylesheet" href="/theme/css/pygment.dark.css" media="(prefers-color-scheme: dark)" />
			<link type="text/css" rel="stylesheet" href="/theme/css/normalize.css" />
			<link type="text/css" rel="stylesheet" href="/theme/css/style.css" />
			<link type="text/css" rel="stylesheet" href="/theme/css/toc.css" />
		{% endblock %}
		<script async src="https://www.googletagmanager.com/gtag/js?id=UA-172447473-1"></script>
		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag(){dataLayer.push(arguments);}
			gtag('js', new Date());
			
			gtag('config', 'UA-172447473-1');
		</script>
	</head>
	<body>
		<header>
			{% block header %}
			{% endblock %}
		</header>
		<main>
			{% block content %}
			{% endblock %}
		</main>
		<footer>
			{% block footer %}
			{% endblock %}
		</footer>
	</body>
</html>
